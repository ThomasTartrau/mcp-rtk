stages:
  - check
  - test
  - build
  - release

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUSTFLAGS: "-D warnings"

default:
  image: rust:1.94.0
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/registry
      - .cargo/git
      - target/

# ── Check stage ─────────────────────────────────────────

fmt:
  stage: check
  script:
    - rustup component add rustfmt
    - cargo fmt --all -- --check
  cache:
    policy: pull

clippy:
  stage: check
  script:
    - rustup component add clippy
    - cargo clippy --all-targets -- -D warnings

cargo-check:
  stage: check
  script:
    - cargo check --all-targets

# ── Test stage ──────────────────────────────────────────

unit-tests:
  stage: test
  script:
    - cargo test --lib
  needs:
    - cargo-check

integration-tests:
  stage: test
  script:
    - cargo test --test integration
  needs:
    - cargo-check

benchmark-tests:
  stage: test
  script:
    - cargo test --test benchmark_savings
  needs:
    - cargo-check

proptest:
  stage: test
  script:
    - cargo test --test proptest_filter
  needs:
    - cargo-check

doc-tests:
  stage: test
  before_script:
    - rm -rf target/debug/examples target/debug/incremental
  script:
    - cargo test --doc
  needs:
    - cargo-check

# ── Benchmark stage (bencher.dev perf regression tracking) ─

bench-main:
  stage: test
  image: rust:1.94.0
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSfL https://bencher.dev/download/install-cli.sh | sh
    - export PATH="${CARGO_HOME}/bin:$PATH"
  script:
    - |
      bencher run \
      --project mcp-rtk \
      --token "$BENCHER_API_TOKEN" \
      --branch main \
      --testbed ci \
      --adapter rust_criterion \
      --err \
      cargo bench --bench filter_perf
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

bench-mr:
  stage: test
  image: rust:1.94.0
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSfL https://bencher.dev/download/install-cli.sh | sh
    - export PATH="${CARGO_HOME}/bin:$PATH"
  script:
    - |
      HASH_FLAG=""
      if [ -n "$CI_MERGE_REQUEST_TARGET_BRANCH_SHA" ]; then
        HASH_FLAG="--start-point-hash $CI_MERGE_REQUEST_TARGET_BRANCH_SHA"
      fi
      bencher run \
      --project mcp-rtk \
      --token "$BENCHER_API_TOKEN" \
      --branch "$CI_COMMIT_REF_NAME" \
      --start-point "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" \
      $HASH_FLAG \
      --start-point-clone-thresholds \
      --start-point-reset \
      --testbed ci \
      --adapter rust_criterion \
      --err \
      cargo bench --bench filter_perf
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Build stage ─────────────────────────────────────────

build-debug:
  stage: build
  script:
    - cargo build --all-targets
  needs:
    - unit-tests
    - integration-tests

build-release:
  stage: build
  script:
    - cargo build --release
  artifacts:
    paths:
      - target/release/mcp-rtk
    expire_in: 7 days
  needs:
    - unit-tests
    - integration-tests
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ── Release stage (semantic-release) ────────────────────

semantic-release:
  stage: release
  image: node:22
  cache: {}
  needs:
    - build-release
  variables:
    CARGO_REGISTRY_TOKEN: ${CRATES_IO_TOKEN}
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl build-essential
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
    - ln -sf "${CARGO_HOME}/bin/cargo" /usr/local/bin/cargo
    - ln -sf "${CARGO_HOME}/bin/rustc" /usr/local/bin/rustc
    - export PATH="${CARGO_HOME}/bin:$PATH"
    - npm install -g semantic-release
        @semantic-release/commit-analyzer
        @semantic-release/release-notes-generator
        @semantic-release/changelog
        @semantic-release/exec
        @semantic-release/git
        @semantic-release/gitlab
        conventional-changelog-conventionalcommits
  script:
    - export PATH="${CARGO_HOME}/bin:$PATH"
    - git remote set-url origin "https://gitlab-ci-token:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
    - semantic-release
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
